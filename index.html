<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GST Invoice Generator | Bharat Rajatiya Finance Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--a:#1b3f6e;--ah:#25548e;--ad:rgba(27,63,110,.1);--bg:#f4f7fc;--bg2:#e9edf5;--bg3:#fff;--tx:#0d1420;--t2:#4a5568;--t3:#8898aa;--bdr:rgba(0,0,0,.08);--serif:'Playfair Display',Georgia,serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
.header{background:var(--a);padding:18px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--serif);color:#fff;font-size:1.1rem;font-weight:700}
.back{font-size:.75rem;color:rgba(255,255,255,.75)}
.back:hover{color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:28px 20px}
h1{font-family:var(--serif);font-size:clamp(1.4rem,3vw,2rem);font-weight:700;margin-bottom:5px}
.sub{color:var(--t2);font-size:.87rem;margin-bottom:28px}
.main-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:20px}
.card{background:var(--bg3);border:1px solid var(--bdr);border-radius:12px;padding:22px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.card h3{font-size:.88rem;font-weight:600;color:var(--a);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.fl{font-family:var(--mono);font-size:.6rem;letter-spacing:.09em;text-transform:uppercase;color:var(--t3)}
.fi{background:var(--bg);border:1.5px solid var(--bdr);border-radius:6px;padding:8px 11px;font-family:var(--sans);font-size:.85rem;color:var(--tx);outline:none;width:100%}
.fi:focus{border-color:var(--a)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:6px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;font-family:var(--sans)}
.btn-p{background:var(--a);color:#fff}.btn-p:hover{background:var(--ah)}
.btn-g{background:var(--bg2);color:var(--t2);border:1px solid var(--bdr)}.btn-g:hover{color:var(--tx)}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
/* ITEMS TABLE */
.it-hd{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px;gap:7px;padding:6px 0;border-bottom:2px solid var(--a);font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:var(--a)}
.it-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 80px;gap:7px;margin-top:7px;align-items:center}
.fi-sm{background:var(--bg);border:1.5px solid var(--bdr);border-radius:5px;padding:7px 9px;font-family:var(--sans);font-size:.82rem;color:var(--tx);outline:none;width:100%}
.fi-sm:focus{border-color:var(--a)}
select.fi-sm{cursor:pointer}
.del-btn{background:var(--bg2);border:1px solid var(--bdr);border-radius:5px;padding:7px;cursor:pointer;color:var(--t3);font-size:.85rem;text-align:center;transition:.2s}
.del-btn:hover{color:#b91c1c;border-color:rgba(185,28,28,.2);background:rgba(185,28,28,.05)}
.tot-box{background:var(--bg2);border-radius:8px;padding:14px;margin-top:14px;display:flex;flex-direction:column;gap:6px}
.tot-row{display:flex;justify-content:space-between;font-size:.84rem;color:var(--t2)}
.tot-row.final{border-top:1px solid var(--bdr);padding-top:8px;margin-top:2px;font-weight:700;font-size:.95rem;color:var(--tx)}
/* PREVIEW */
.inv{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:32px;font-size:.82rem;color:#333;min-height:500px}
.inv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--a)}
.inv-from strong{font-size:1.1rem;color:var(--a);font-family:var(--serif)}
.inv-from p{font-size:.75rem;color:#666;margin-top:3px;line-height:1.55}
.inv-title{text-align:right}
.inv-title .tax-inv{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:var(--a)}
.inv-title p{font-size:.75rem;color:#666;margin-top:2px}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:18px}
.inv-party h4{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--a);margin-bottom:5px}
.inv-party p{font-size:.75rem;color:#444;line-height:1.6}
.inv-table{width:100%;border-collapse:collapse;font-size:.78rem}
.inv-table th{background:var(--a);color:#fff;padding:7px 8px;text-align:left;font-weight:500}
.inv-table td{padding:6px 8px;border-bottom:1px solid #eee}
.inv-table tr:nth-child(even) td{background:#f8f9fb}
.inv-tots{margin-top:12px;display:flex;justify-content:flex-end}
.inv-tots-inner{width:240px}
.inv-tr{display:flex;justify-content:space-between;padding:4px 0;font-size:.79rem;color:#555;border-bottom:1px solid #eee}
.inv-tr.final{font-weight:700;font-size:.9rem;color:var(--a);border-top:2px solid var(--a);border-bottom:none;padding-top:6px;margin-top:2px}
.inv-notes{margin-top:16px;padding-top:12px;border-top:1px dashed #ddd;font-size:.73rem;color:#666}
.inv-footer{margin-top:20px;text-align:center;font-size:.7rem;color:#aaa;border-top:1px solid #eee;padding-top:10px}
@media(max-width:800px){.main-grid{grid-template-columns:1fr}.it-hd{grid-template-columns:2fr 1fr 1fr 60px}.it-row{grid-template-columns:2fr 1fr 1fr 60px}.it-hd div:nth-child(4),.it-row div:nth-child(4){display:none}.inv-parties{grid-template-columns:1fr}.inv-head{flex-direction:column;gap:12px}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">BR. Finance Tools</div>
  <a href="https://bharatrajatiya.com" class="back">← bharatrajatiya.com</a>
</div>
<div class="wrap">
  <h1>GST Invoice Generator</h1>
  <p class="sub">Create professional tax invoices instantly. Fill the form → preview updates live → print or save as PDF.</p>
  <div class="main-grid">
    <div>
      <div class="card" style="margin-bottom:16px">
        <h3>Your Business Details</h3>
        <div class="fg"><label class="fl">Business / Your Name</label><input class="fi" id="fn" placeholder="Your Name or Business" oninput="render()"/></div>
        <div class="fg"><label class="fl">Address</label><input class="fi" id="fa" placeholder="City, State, India" oninput="render()"/></div>
        <div class="row2">
          <div class="fg"><label class="fl">GSTIN (optional)</label><input class="fi" id="fg2" placeholder="22AAAAA0000A1Z5" oninput="render()"/></div>
          <div class="fg"><label class="fl">Phone / Email</label><input class="fi" id="fp" placeholder="+91 XXXXX XXXXX" oninput="render()"/></div>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <h3>Client Details</h3>
        <div class="fg"><label class="fl">Client Name</label><input class="fi" id="cn" placeholder="Client Name" oninput="render()"/></div>
        <div class="fg"><label class="fl">Client Address</label><input class="fi" id="ca" placeholder="Client City, State" oninput="render()"/></div>
        <div class="fg"><label class="fl">Client GSTIN (optional)</label><input class="fi" id="cg" placeholder="Client GSTIN" oninput="render()"/></div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <h3>Invoice Details</h3>
        <div class="row2">
          <div class="fg"><label class="fl">Invoice No.</label><input class="fi" id="ino" value="INV-001" oninput="render()"/></div>
          <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="idate" oninput="render()"/></div>
        </div>
        <div class="fg"><label class="fl">Notes / Payment Terms</label><input class="fi" id="notes" placeholder="e.g. Payment due within 15 days" oninput="render()"/></div>
      </div>
      <div class="card">
        <h3>Line Items</h3>
        <div class="it-hd"><div>Description</div><div>Qty</div><div>Rate (₹)</div><div>GST %</div><div>Amount</div></div>
        <div id="items"></div>
        <button class="btn btn-g" style="margin-top:12px;font-size:.78rem" onclick="addItem()">+ Add Item</button>
        <div class="tot-box" id="tots"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <h3>Live Preview</h3>
        <div class="inv" id="inv"></div>
        <div class="btn-row">
          <button class="btn btn-p" onclick="window.print()">🖨 Print / Save PDF</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
let items=[{desc:'Professional Finance Consulting',qty:1,rate:10000,gst:18},{desc:'',qty:1,rate:0,gst:18}];
function addItem(){items.push({desc:'',qty:1,rate:0,gst:18});renderItems();render();}
function delItem(i){items.splice(i,1);renderItems();render();}
function renderItems(){
  let h='';
  items.forEach((it,i)=>{
    const amt=(it.qty*it.rate).toFixed(0);
    h+=`<div class="it-row">
      <input class="fi-sm" placeholder="Description" value="${it.desc}" oninput="items[${i}].desc=this.value;render()"/>
      <input class="fi-sm" type="number" value="${it.qty}" min="1" oninput="items[${i}].qty=+this.value;renderItems();render()"/>
      <input class="fi-sm" type="number" value="${it.rate}" min="0" oninput="items[${i}].rate=+this.value;renderItems();render()"/>
      <select class="fi-sm" onchange="items[${i}].gst=+this.value;renderItems();render()">
        <option value="0" ${it.gst==0?'selected':''}>0%</option>
        <option value="5" ${it.gst==5?'selected':''}>5%</option>
        <option value="12" ${it.gst==12?'selected':''}>12%</option>
        <option value="18" ${it.gst==18?'selected':''}>18%</option>
        <option value="28" ${it.gst==28?'selected':''}>28%</option>
      </select>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:.8rem;font-weight:600;color:var(--a)">₹${(+amt).toLocaleString()}</span>
        <button class="del-btn" onclick="delItem(${i})">✕</button>
      </div>
    </div>`;
  });
  document.getElementById('items').innerHTML=h;
  let sub=0,gstAmt=0;
  items.forEach(it=>{const a=it.qty*it.rate;sub+=a;gstAmt+=a*(it.gst/100);});
  const total=sub+gstAmt;
  document.getElementById('tots').innerHTML=`
    <div class="tot-row"><span>Subtotal</span><span>₹${sub.toLocaleString()}</span></div>
    <div class="tot-row"><span>GST</span><span>₹${gstAmt.toLocaleString()}</span></div>
    <div class="tot-row final"><span>Total</span><span>₹${total.toLocaleString()}</span></div>`;
}
function render(){
  const fn=document.getElementById('fn').value||'Your Business';
  const fa=document.getElementById('fa').value||'Address';
  const fg2=document.getElementById('fg2').value;
  const fp=document.getElementById('fp').value;
  const cn=document.getElementById('cn').value||'Client Name';
  const ca=document.getElementById('ca').value||'Client Address';
  const cg=document.getElementById('cg').value;
  const ino=document.getElementById('ino').value;
  const idate=document.getElementById('idate').value;
  const notes=document.getElementById('notes').value;
  let sub=0,gstAmt=0,rows='';
  items.forEach(it=>{
    if(!it.desc&&!it.rate)return;
    const a=it.qty*it.rate;const g=a*(it.gst/100);
    sub+=a;gstAmt+=g;
    rows+=`<tr><td>${it.desc||'—'}</td><td style="text-align:center">${it.qty}</td><td style="text-align:right">₹${it.rate.toLocaleString()}</td><td style="text-align:center">${it.gst}%</td><td style="text-align:right">₹${a.toLocaleString()}</td></tr>`;
  });
  const total=sub+gstAmt;
  const fdate=idate?new Date(idate).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
  document.getElementById('inv').innerHTML=`
    <div class="inv-head">
      <div class="inv-from"><strong>${fn}</strong><p>${fa}${fg2?'<br>GSTIN: '+fg2:''}</p>${fp?'<p>'+fp+'</p>':''}</div>
      <div class="inv-title"><div class="tax-inv">TAX INVOICE</div><p>No: ${ino}</p><p>Date: ${fdate}</p></div>
    </div>
    <div class="inv-parties">
      <div class="inv-party"><h4>Bill To</h4><p><strong>${cn}</strong><br>${ca}${cg?'<br>GSTIN: '+cg:''}</p></div>
    </div>
    <table class="inv-table"><thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>GST</th><th>Amount</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="inv-tots"><div class="inv-tots-inner">
      <div class="inv-tr"><span>Subtotal</span><span>₹${sub.toLocaleString()}</span></div>
      <div class="inv-tr"><span>GST</span><span>₹${gstAmt.toLocaleString()}</span></div>
      <div class="inv-tr final"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
    </div></div>
    ${notes?'<div class="inv-notes"><strong>Notes:</strong> '+notes+'</div>':''}
    <div class="inv-footer">Generated via bharatrajatiya.com · This is a computer-generated invoice.</div>`;
}
// set today's date
document.getElementById('idate').value=new Date().toISOString().split('T')[0];
renderItems();render();
</script>
<style>
@media print{
  .header,.wrap>h1,.wrap>.sub,.main-grid>div:first-child,.btn-row,.card>h3{display:none!important}
  .main-grid{display:block!important}
  .card{border:none!important;padding:0!important;box-shadow:none!important}
  body{background:#fff}
  .inv{border:none!important}
}
</style>
</body>
</html>
